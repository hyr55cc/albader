<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Tajawal:wght@300;400;500;700&family=Lateef:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;--card:#fffdf7;--accent:#6b8f71;--accent-light:#a8c5ae;--accent-dark:#4a6b50;
  --text:#2d3a2e;--text-muted:#7a8c7b;--border:#d8e8da;--gold:#b5955a;
  --shadow:rgba(107,143,113,.12);--check-idle:#c8d8ca;--check-done:#6b8f71;--font:'Tajawal',sans-serif;
}
body.theme-green{--bg:#f5f0e8;--card:#fffdf7;--accent:#6b8f71;--accent-light:#a8c5ae;--accent-dark:#4a6b50;--text:#2d3a2e;--text-muted:#7a8c7b;--border:#d8e8da;--gold:#b5955a;--shadow:rgba(107,143,113,.12);--check-idle:#c8d8ca;--check-done:#6b8f71}
body.theme-blue {--bg:#eef2fa;--card:#f7f9fe;--accent:#5b7baa;--accent-light:#90afd4;--accent-dark:#3a5880;--text:#1e2d40;--text-muted:#6a82a0;--border:#c0d0e8;--gold:#8a7040;--shadow:rgba(91,123,170,.12);--check-idle:#b8cbdf;--check-done:#5b7baa}
body.theme-sand {--bg:#f2ece0;--card:#faf6ee;--accent:#a07850;--accent-light:#c8a87a;--accent-dark:#6e5030;--text:#3a2c18;--text-muted:#9a7a50;--border:#ddd0b8;--gold:#b07030;--shadow:rgba(160,120,80,.12);--check-idle:#d8c8a8;--check-done:#a07850}
body.theme-rose {--bg:#f7f0f2;--card:#fdf8f9;--accent:#9a6070;--accent-light:#c490a0;--accent-dark:#703040;--text:#3a1820;--text-muted:#9a7080;--border:#e0c8d0;--gold:#a07848;--shadow:rgba(154,96,112,.12);--check-idle:#ddc0c8;--check-done:#9a6070}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;transition:background .5s,color .4s}

/* TOP CONTROLS */
.top-controls{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px var(--shadow)}
.ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;max-width:620px;margin:0 auto}
.ctrl-label{font-size:11px;color:var(--text-muted);font-family:'Tajawal',sans-serif;white-space:nowrap}
.sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.theme-btns,.font-btns{display:flex;gap:5px}
.theme-btn{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .2s,border-color .2s}
.theme-btn:hover{transform:scale(1.15)}
.theme-btn.active{border-color:var(--text)}
.theme-btn[data-t="green"]{background:linear-gradient(135deg,#a8c5ae,#6b8f71)}
.theme-btn[data-t="blue"] {background:linear-gradient(135deg,#90afd4,#5b7baa)}
.theme-btn[data-t="sand"] {background:linear-gradient(135deg,#c8a87a,#a07850)}
.theme-btn[data-t="rose"] {background:linear-gradient(135deg,#c490a0,#9a6070)}
.font-btn{padding:3px 10px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:12px;font-family:'Tajawal',sans-serif;transition:all .2s;white-space:nowrap}
.font-btn:hover{background:var(--border)}
.font-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:0;max-width:580px;margin:16px auto 0;padding:0 14px}
.cat-tab{flex:1;padding:10px 6px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;transition:all .2s;text-align:center;position:relative}
.cat-tab:first-child{border-radius:12px 0 0 12px}
.cat-tab:last-child{border-radius:0 12px 12px 0}
.cat-tab:not(:last-child){border-left:none}
.cat-tab:hover{background:var(--border);color:var(--text)}
.cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);z-index:1}
.cat-tab .auto-badge{display:inline-block;font-size:9px;background:var(--gold);color:#fff;border-radius:6px;padding:1px 5px;margin-right:4px;vertical-align:middle;font-weight:700}

/* HEADER */
.header{text-align:center;padding:14px 20px 10px}
.header-ornament{font-family:'Amiri',serif;color:var(--gold);font-size:20px;letter-spacing:5px;opacity:.8;margin-bottom:6px}
.header h1{font-family:var(--font);font-size:26px;color:var(--accent-dark);font-weight:700;margin-bottom:3px}
.time-display{font-family:'Tajawal',sans-serif;font-size:12px;color:var(--text-muted);margin-bottom:5px}
.divider{width:70px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px auto 0}

/* PROGRESS */
.progress-wrap{max-width:560px;margin:10px auto 0;padding:0 14px}
.progress-label{font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:4px;font-family:'Tajawal',sans-serif}
.progress-bar{height:5px;background:var(--border);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-light),var(--accent));border-radius:10px;transition:width .4s}

/* CARDS */
.container{max-width:580px;margin:0 auto;padding:12px 14px 90px}
.azkar-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;display:flex;align-items:stretch;box-shadow:0 2px 10px var(--shadow);overflow:hidden;transition:opacity .35s,transform .35s,max-height .35s,margin .35s;animation:fadeIn .35s ease forwards;position:relative}
.azkar-card::before{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--accent-light),var(--accent))}
.azkar-card.done{opacity:0;transform:scale(.95) translateY(-6px);max-height:0!important;margin-bottom:0;padding:0;border:none;pointer-events:none}
.card-body{flex:1;padding:16px 20px 12px 10px;text-align:right;direction:rtl}
.zikr-text{font-family:var(--font);font-size:20px;line-height:2;color:var(--text);margin-bottom:6px;text-align:right;direction:rtl}
.zikr-source{font-size:11px;color:var(--text-muted);font-family:'Tajawal',sans-serif;margin-bottom:8px;text-align:right}
.counter-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;direction:rtl}
.counter-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--accent-light);background:transparent;cursor:pointer;transition:all .2s;font-size:12px;display:flex;align-items:center;justify-content:center;color:transparent}
.dot.filled{background:var(--accent);border-color:var(--accent);color:#fff}
.dot:hover{transform:scale(1.1)}
.counter-text{font-size:11px;color:var(--text-muted);font-family:'Tajawal',sans-serif}

/* CHECK BUTTON */
.check-col{display:flex;align-items:stretch;min-width:56px;max-width:56px;border-right:1px solid var(--border)}
.check-btn{width:100%;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:background .25s;padding:10px 0}
.check-btn:hover{background:rgba(0,0,0,.04)}
.check-btn:active{background:rgba(0,0,0,.08)}
.check-icon{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--check-idle);background:transparent;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--check-idle);transition:all .25s}
.check-btn:hover .check-icon{border-color:var(--check-done);color:var(--check-done);background:rgba(0,0,0,.05)}
.check-icon.partial{border-color:var(--accent-light);color:var(--accent-light)}
.check-count{font-family:'Tajawal',sans-serif;font-size:10px;color:var(--text-muted);line-height:1}

/* ALL DONE */
.all-done{text-align:center;padding:50px 20px;display:none}
.all-done.show{display:block}
.all-done .icon{font-size:48px;margin-bottom:12px;animation:pulse 2s infinite}
.all-done h2{font-family:var(--font);font-size:24px;color:var(--accent-dark);margin-bottom:8px}
.all-done p{color:var(--text-muted);font-size:14px;line-height:1.8;font-family:'Tajawal',sans-serif}
.reset-btn{margin-top:20px;padding:10px 28px;border-radius:28px;border:none;background:var(--accent);color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px var(--shadow)}
.reset-btn:hover{background:var(--accent-dark);transform:translateY(-1px)}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
body.fs-sm .zikr-text{font-size:17px}
body.fs-md .zikr-text{font-size:20px}
body.fs-lg .zikr-text{font-size:24px}
body.fs-xl .zikr-text{font-size:28px}
</style>
</head>
<body class="theme-green fs-md">

<!-- TOP CONTROLS -->
<div class="top-controls">
  <div class="ctrl-row">
    <span class="ctrl-label">🎨</span>
    <div class="theme-btns">
      <button class="theme-btn active" data-t="green" onclick="setTheme('green',this)" title="أخضر"></button>
      <button class="theme-btn" data-t="blue"  onclick="setTheme('blue',this)"  title="أزرق"></button>
      <button class="theme-btn" data-t="sand"  onclick="setTheme('sand',this)"  title="بيج"></button>
      <button class="theme-btn" data-t="rose"  onclick="setTheme('rose',this)"  title="وردي"></button>
    </div>
    <div class="sep"></div>
    <span class="ctrl-label">🔤</span>
    <div class="font-btns">
      <button class="font-btn" data-f="Amiri" onclick="setFont('Amiri',this)">أميري</button>
      <button class="font-btn" data-f="Scheherazade New" onclick="setFont('Scheherazade New',this)">شهرزاد</button>
      <button class="font-btn active" data-f="Tajawal" onclick="setFont('Tajawal',this)">تجوّل</button>
      <button class="font-btn" data-f="Lateef" onclick="setFont('Lateef',this)">لطيف</button>
    </div>
    <div class="sep"></div>
    <span class="ctrl-label">📏</span>
    <div class="font-btns">
      <button class="font-btn" data-s="fs-sm" onclick="setSize('fs-sm',this)">ص</button>
      <button class="font-btn active" data-s="fs-md" onclick="setSize('fs-md',this)">م</button>
      <button class="font-btn" data-s="fs-lg" onclick="setSize('fs-lg',this)">ك</button>
      <button class="font-btn" data-s="fs-xl" onclick="setSize('fs-xl',this)">ك+</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-ornament">﷽</div>
  <h1 id="mainTitle">أذكار الصباح</h1>
  <div class="time-display" id="timeDisplay"></div>
  <div class="divider"></div>
</div>

<!-- CATEGORY TABS -->
<div class="cat-tabs">
  <button class="cat-tab" id="tab-morning" onclick="switchTab('morning')">🌅 الصباح</button>
  <button class="cat-tab" id="tab-evening" onclick="switchTab('evening')">🌆 المساء</button>
  <button class="cat-tab" id="tab-other"   onclick="switchTab('other')">🌙 أدعية عامة</button>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-label" id="progressLabel">0 / 0 مكتمل</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<!-- CARDS -->
<div class="container" id="azkarContainer"></div>
<div class="all-done" id="allDone">
  <div class="icon">✨</div>
  <h2>أحسنت! اكتملت الأذكار</h2>
  <p>جزاك الله خيرًا وبارك في وقتك</p>
  <button class="reset-btn" onclick="resetAll()">إعادة الأذكار</button>
</div>

<script>
const AZKAR = {
  morning: [
    {text:"أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ\n﴿ اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ ﴾",source:"آية الكرسي — البقرة:255",count:1},
    {text:"﴿ قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ ﴾",source:"سورة الإخلاص",count:3},
    {text:"﴿ قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِن شَرِّ مَا خَلَقَ ۝ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ ﴾",source:"سورة الفلق",count:3},
    {text:"﴿ قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّاسِ ۝ مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ ﴾",source:"سورة الناس",count:3},
    {text:"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ",source:"رواه مسلم",count:1},
    {text:"اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ",source:"رواه الترمذي وأبو داود",count:1},
    {text:"اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ وَأَبُوءُ بِذَنْبِي، فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ",source:"سيد الاستغفار — رواه البخاري",count:1},
    {text:"اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ وَمَلَائِكَتَكَ وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ",source:"رواه أبو داود وابن حبان",count:4},
    {text:"اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ، فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ",source:"رواه أبو داود",count:1},
    {text:"اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ، اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لَا إِلَهَ إِلَّا أَنْتَ",source:"رواه أبو داود",count:3},
    {text:"رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ ﷺ نَبِيًّا وَرَسُولًا",source:"رواه أبو داود والترمذي",count:3},
    {text:"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",source:"رواه البخاري ومسلم",count:100},
    {text:"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",source:"رواه البخاري ومسلم",count:10},
    {text:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى نَبِيِّنَا مُحَمَّدٍ",source:"الصلاة على النبي ﷺ",count:10},

/* ─── STATE ─── */
let state = {};
let activeTab = '';   // user-chosen tab (overrides auto)
let autoTab = '';     // what time says

function getAutoTab(h, m) {
  const t = h*100+m;
  if (t<=1200) return 'morning';
  if (t<=1700) return 'evening';
  return 'other';
}

function currentCat() { return activeTab || autoTab; }

function key(cat, i) { return `${cat}_${i}`; }

function initState(cat) {
  AZKAR[cat].forEach((_,i)=>{ const k=key(cat,i); if(!(k in state)) state[k]=0; });
}

/* ─── TABS ─── */
function updateTabs() {
  const cat = currentCat();
  ['morning','evening','other'].forEach(t=>{
    const el=document.getElementById(`tab-${t}`);
    el.classList.toggle('active', t===cat);
  });
  // show auto badge on current auto tab
  document.querySelectorAll('.auto-badge').forEach(b=>b.remove());
  const autoEl=document.getElementById(`tab-${autoTab}`);
  if(autoEl){
    const badge=document.createElement('span');
    badge.className='auto-badge';
    badge.textContent='تلقائي';
    autoEl.prepend(badge);
  }
}

function switchTab(cat) {
  activeTab = cat;
  initState(cat);
  updateTabs();
  renderTitle(cat);
  buildCards(cat);
}

/* ─── HEADER ─── */
const titles={morning:'أذكار الصباح',evening:'أذكار المساء',other:'أذكار وأدعية عامة'};
function renderTitle(cat){
  document.getElementById('mainTitle').textContent = titles[cat];
}

/* ─── CARDS ─── */
function buildCards(cat) {
  const azkar = AZKAR[cat];
  const box = document.getElementById('azkarContainer');
  const allDone = document.getElementById('allDone');
  box.innerHTML='';
  allDone.classList.remove('show');

  let total=azkar.length, done=0;
  azkar.forEach((z,i)=>{
    const prog=state[key(cat,i)]||0;
    if(prog>=z.count){ done++; return; }

    const card=document.createElement('div');
    card.className='azkar-card';
    card.id=`card-${cat}-${i}`;
    card.style.maxHeight='600px';

    let cntHTML='';
    if(z.count===1){
      cntHTML=`<span class="counter-text">مرة واحدة</span>`;
    } else if(z.count<=10){
      let dots='';
      for(let d=0;d<z.count;d++){
        const f=d<prog?'filled':'';
        dots+=`<button class="dot ${f}" onclick="tapDot('${cat}',${i},${d})">✓</button>`;
      }
      cntHTML=`<div class="counter-dots" id="dots-${cat}-${i}">${dots}</div><span class="counter-text" id="ct-${cat}-${i}">${prog}/${z.count}</span>`;
    } else {
      cntHTML=`<span class="counter-text" id="ct-${cat}-${i}">${prog}/${z.count} مرة</span>`;
    }

    const partial=prog>0?'partial':'';
    card.innerHTML=`
      <div class="check-col">
        <button class="check-btn" onclick="tapCheck('${cat}',${i})" title="تم ✓">
          <div class="check-icon ${partial}" id="ci-${cat}-${i}">✓</div>
          ${z.count>1?`<span class="check-count" id="cc-${cat}-${i}">${prog}/${z.count}</span>`:''}
        </button>
      </div>
      <div class="card-body">
        <div class="zikr-text">${z.text.replace(/\n/g,'<br>')}</div>
        <div class="zikr-source">${z.source}</div>
        <div class="counter-wrap" id="cw-${cat}-${i}">${cntHTML}</div>
      </div>`;
    box.appendChild(card);
  });

  updateProgress(done, total);
  if(done===total) showAllDone();
}

function tapCheck(cat, i){
  const z=AZKAR[cat][i];
  const k=key(cat,i);
  state[k]=(state[k]||0)+1;
  if(state[k]>=z.count) dismiss(cat,i);
  else refreshCard(cat,i);
}

function tapDot(cat, i, d){
  const k=key(cat,i);
  const prog=state[k]||0;
  if(d===prog){
    state[k]=prog+1;
    if(state[k]>=AZKAR[cat][i].count) dismiss(cat,i);
    else refreshCard(cat,i);
  }
}

function refreshCard(cat, i){
  const z=AZKAR[cat][i];
  const prog=state[key(cat,i)]||0;
  const ci=document.getElementById(`ci-${cat}-${i}`);
  if(ci){ ci.classList.toggle('partial',prog>0); }
  const cc=document.getElementById(`cc-${cat}-${i}`);
  if(cc) cc.textContent=`${prog}/${z.count}`;
  const dotsEl=document.getElementById(`dots-${cat}-${i}`);
  if(dotsEl) [...dotsEl.children].forEach((btn,d)=>btn.classList.toggle('filled',d<prog));
  const ct=document.getElementById(`ct-${cat}-${i}`);
  if(ct) ct.textContent=z.count<=10?`${prog}/${z.count}`:`${prog}/${z.count} مرة`;
}

function dismiss(cat, i){
  const card=document.getElementById(`card-${cat}-${i}`);
  if(!card) return;
  const ci=document.getElementById(`ci-${cat}-${i}`);
  if(ci){ ci.style.background='var(--check-done)'; ci.style.borderColor='var(--check-done)'; ci.style.color='white'; }
  setTimeout(()=>{
    card.classList.add('done');
    setTimeout(()=>{ card.remove(); checkAllDone(cat); },360);
  },280);
}

function checkAllDone(cat){
  let total=AZKAR[cat].length, done=0;
  AZKAR[cat].forEach((_,i)=>{ if((state[key(cat,i)]||0)>=AZKAR[cat][i].count) done++; });
  updateProgress(done,total);
  if(done===total) showAllDone();
}

function updateProgress(done,total){
  const pct=total>0?(done/total)*100:0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${done} / ${total} مكتمل`;
}

function showAllDone(){ document.getElementById('allDone').classList.add('show'); }

function resetAll(){
  const cat=currentCat();
  AZKAR[cat].forEach((_,i)=>state[key(cat,i)]=0);
  buildCards(cat);
}

/* ─── TIME LOOP ─── */
function updateTime(){
  const now=new Date();
  const h=now.getHours(), m=now.getMinutes();
  const ap=h<12?'ص':'م';
  document.getElementById('timeDisplay').textContent=`الوقت: ${h%12||12}:${String(m).padStart(2,'0')} ${ap}`;
  const newAuto=getAutoTab(h,m);
  if(newAuto!==autoTab){
    autoTab=newAuto;
    // if user hasn't manually chosen a tab, switch automatically
    if(!activeTab){
      initState(autoTab);
      renderTitle(autoTab);
      buildCards(autoTab);
    }
    updateTabs();
  }
}

/* ─── THEME / FONT ─── */
function setTheme(t,btn){
  document.body.className=document.body.className.replace(/theme-\w+/,'')+` theme-${t}`;
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setFont(f,btn){
  document.documentElement.style.setProperty('--font',`'${f}', serif`);
  document.querySelectorAll('.font-btn[data-f]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setSize(s,btn){
  document.body.className=document.body.className.replace(/fs-\w+/,'')+` ${s}`;
  document.querySelectorAll('.font-btn[data-s]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* ─── INIT ─── */
setFont('Tajawal', document.querySelector('.font-btn[data-f="Tajawal"]'));
const now=new Date();
autoTab=getAutoTab(now.getHours(),now.getMinutes());
initState(autoTab);
renderTitle(autoTab);
updateTabs();
buildCards(autoTab);
updateTime();
setInterval(updateTime, 30000);
</script>

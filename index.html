
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مخطط هندسي تفاعلي</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>مخطط هندسي تفاعلي</h1>
  <p>نسخة جوال + تعديل مباشر للمقاسات</p>
</header>

<div class="controls">

  <div class="input-group">
    <label>العرض الخارجي (سم)</label>
    <input type="range" min="150" max="500" value="220" id="widthRange">
    <span id="widthValue">220 سم</span>
  </div>

  <div class="input-group">
    <label>الارتفاع (سم)</label>
    <input type="range" min="150" max="500" value="200" id="heightRange">
    <span id="heightValue">200 سم</span>
  </div>

  <div class="input-group">
    <label>عرض الحمام (سم)</label>
    <input type="range" min="50" max="200" value="95" id="bathroomRange">
    <span id="bathroomValue">95 سم</span>
  </div>

</div>

<div class="canvas">

<svg id="floorplan" viewBox="0 0 900 1400">

  <rect
    id="outerWall"
    x="180"
    y="80"
    rx="30"
    ry="30"
    width="540"
    height="1100"
    class="wall"
  />

  <line x1="360" y1="120" x2="360" y2="600" class="inner-wall"/>
  <line x1="540" y1="120" x2="540" y2="600" class="inner-wall"/>

  <rect
    id="bathroom"
    x="540"
    y="700"
    width="180"
    height="220"
    class="inner-wall"
  />

  <text
    id="topLabel"
    x="450"
    y="55"
    text-anchor="middle"
    class="dimension"
  >
    220 سم
  </text>

  <text
    id="sideLabel"
    x="760"
    y="550"
    transform="rotate(90 760 550)"
    class="dimension"
  >
    200 سم
  </text>

  <text
    id="bathroomLabel"
    x="630"
    y="820"
    text-anchor="middle"
    class="label"
  >
    حمام 95 سم
  </text>

  <text
    x="450"
    y="1100"
    text-anchor="middle"
    class="label"
  >
    جلسة سرير
  </text>

</svg>

</div>

<div class="buttons">
  <button onclick="downloadSVG()">تحميل SVG</button>
  <button onclick="window.print()">طباعة</button>
</div>

<script src="script.js"></script>

</body>
</html>

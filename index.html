<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقويم المزدوج</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 التقويم المزدوج</h1>
            <div class="date-display">
                <div class="hijri-box">
                    <span class="label">التاريخ الهجري</span>
                    <span id="hijriDate" class="date-text">جاري التحميل...</span>
                </div>
                <div class="gregorian-box">
                    <span class="label">التاريخ الميلادي</span>
                    <span id="gregorianDate" class="date-text">جاري التحميل...</span>
                </div>
            </div>
        </header>

        <main>
            <div class="calendar-controls">
                <button id="prevMonth" onclick="prevMonth()">◀ الشهر السابق</button>
                <h2 id="currentMonthYear">جاري التحميل...</h2>
                <button id="nextMonth" onclick="nextMonth()">الشهر التالي ▶</button>
            </div>

            <div class="calendars-wrapper">
                <div class="calendar-section hijri-section">
                    <h3>🌙 التقويم الهجري</h3>
                    <div class="calendar-grid" id="hijriCalendar">
                        <div class="loading">جاري تحميل التقويم...</div>
                    </div>
                </div>

                <div class="calendar-section gregorian-section">
                    <h3>☀️ التقويم الميلادي</h3>
                    <div class="calendar-grid" id="gregorianCalendar">
                        <div class="loading">جاري تحميل التقويم...</div>
                    </div>
                </div>
            </div>

            <div class="appointments-section">
                <h3>📋 المواعيد والتنبيهات</h3>
                <div class="add-appointment">
                    <input type="text" id="appTitle" placeholder="عنوان الموعد">
                    <input type="date" id="appDate">
                    <input type="time" id="appTime">
                    <button onclick="addAppointment()">إضافة موعد</button>
                </div>
                <div id="appointmentsList" class="appointments-list">
                    <p style="text-align:center; opacity:0.7;">لا توجد مواعيد</p>
                </div>
            </div>
        </main>
    </div>

    <div id="notification" class="notification" style="display:none;">
        <div class="notification-content">
            <span class="close-btn" onclick="closeNotification()">×</span>
            <h4>🔔 تذكير!</h4>
            <p id="notificationText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

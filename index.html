<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مخطط قابل للتعديل</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>مخطط هندسي قابل للتعديل</h1>
  <p>جميع المقاسات بالسم</p>
</header>

<main>

<section class="controls">
  <button onclick="downloadSVG()">تحميل SVG</button>
  <button onclick="window.print()">طباعة</button>
</section>

<section class="canvas-wrapper">

<svg id="floorplan" viewBox="0 0 900 1600">

  <rect x="180" y="80" rx="40" ry="40" width="540" height="1280" class="wall" />

  <line x1="360" y1="120" x2="360" y2="650" class="inner-wall" />
  <line x1="540" y1="120" x2="540" y2="650" class="inner-wall" />

  <line x1="360" y1="200" x2="540" y2="200" class="inner-wall" />

  <line x1="180" y1="650" x2="360" y2="650" class="inner-wall" />

  <line x1="180" y1="650" x2="180" y2="980" class="inner-wall" />
  <line x1="180" y1="980" x2="260" y2="980" class="inner-wall" />

  <line x1="540" y1="650" x2="720" y2="650" class="inner-wall" />

  <line x1="540" y1="730" x2="720" y2="730" class="inner-wall" />
  <rect x="540" y="730" width="180" height="260" class="inner-wall" />

  <rect x="560" y="1030" width="100" height="70" class="inner-wall" />

  <line x1="180" y1="1100" x2="720" y2="1100" class="inner-wall" />

  <path d="M360 820 A120 120 0 0 0 260 920" class="door" />

  <text x="450" y="60" text-anchor="middle" class="dimension">220 سم</text>
  <text x="250" y="420" transform="rotate(-90 250 420)" class="dimension">200 سم</text>
  <text x="670" y="420" transform="rotate(90 670 420)" class="dimension">200 سم</text>

  <text x="445" y="170" text-anchor="middle" class="dimension">40</text>

  <text x="300" y="670" class="dimension">85</text>
  <text x="580" y="670" class="dimension">85</text>

  <text x="640" y="860" text-anchor="middle" class="label">حمام</text>
  <text x="640" y="920" text-anchor="middle" class="dimension">95 سم</text>

  <text x="610" y="1080" text-anchor="middle" class="label">مغسلة</text>

  <text x="450" y="1260" text-anchor="middle" class="label">جلسة سرير</text>

</svg>

</section>
</main>

<script src="script.js"></script>

</body>
</html>
